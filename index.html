<!doctype html><html><head><meta charset="utf-8"><title>ARC-SeedCatalog v0.8</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="style.css"></head><body><main><h1>ARC-SeedCatalog v0.8</h1><p>Authorized catalog JSON → ARC proof bundles. No raw titles, URLs, servers, media, or user data exported.</p><section class="grid"><div class="card"><input id="seed" value="arc-seedcatalog-local-demo-seed"><input id="epoch" value="2026-05-16"><textarea id="input"></textarea><button id="build">Build</button><button id="verify">Verify</button><button id="jsonl">JSONL</button></div><div class="card"><select id="view"><option>all</option><option>receipt_bundle</option><option>arc_core_handoff_bundle</option></select><pre id="out">No ingest yet.</pre></div></section></main><script src="src/seedcatalog.js"></script><script>
const ex={servers:[{server_id:'public-domain-node-a',server_type:'authorized_catalog',region:'CA',legal_basis:'public_domain_or_licensed',items:[{path:'/catalog/public-domain/item/001',category:'movie',title:'Temporary Demo Title A'},{path:'/catalog/public-domain/item/002',category:'public-domain',title:'Temporary Demo Title B'}]}]};let last=null;input.value=JSON.stringify(ex,null,2);function render(){out.textContent=JSON.stringify(view.value==='all'?last:last?.[view.value],null,2)}build.onclick=async()=>{last=await ARCSeedCatalog.buildSplitBundles(JSON.parse(input.value),seed.value,epoch.value);render()};verify.onclick=async()=>{out.textContent=JSON.stringify(await ARCSeedCatalog.verifySplitBundle(last),null,2)};jsonl.onclick=()=>{out.textContent=ARCSeedCatalog.arcCoreJSONL(last)};view.onchange=render;
</script></body></html>
