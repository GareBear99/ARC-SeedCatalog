<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ARC-SeedCatalog v0.6</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="./style.css"></head><body><main><header><div class="badge">ARC-SeedCatalog v0.6</div><h1>Authorized catalog JSON → ARC proof bundles.</h1><p class="lede">Static GitHub Pages tool for split-bundle catalog ingestion without exporting raw names, URLs, servers, media, or user data.</p><div class="notice">Use only with lawful/authorized/public-domain/licensed/internal catalogs.</div></header><section class="grid"><div class="card"><h2>Input</h2><div class="row"><div><label>Seed</label><input id="seed" value="arc-seedcatalog-local-demo-seed"></div><div><label>Epoch</label><input id="epoch" value="2026-05-16"></div></div><label>Upload JSON</label><input id="file" type="file" accept=".json,application/json"><label>Catalog JSON</label><textarea id="jsonInput"></textarea><button id="ingest">Build bundles</button><button class="secondary" id="verify">Verify</button><button class="secondary" id="downloadAll">Download all</button><button class="secondary" id="downloadJSONL">Download JSONL</button></div><div class="card"><h2>Output</h2><select id="view"><option value="all">All</option><option value="receipt_bundle">Receipt bundle</option><option value="arc_core_handoff_bundle">ARC-Core handoff</option><option value="arc_core_jsonl">ARC-Core JSONL</option><option value="proof_pack">Proof pack</option></select><pre id="output">No ingest yet.</pre></div></section></main><script src="./src/seedcatalog.js"></script><script>
const ex={servers:[{server_id:"public-domain-node-a",server_type:"authorized_catalog",region:"CA",legal_basis:"public_domain_or_licensed",items:[{path:"/catalog/public-domain/item/001",category:"movie",title:"Temporary Demo Title A"},{path:"/catalog/public-domain/item/002",category:"public-domain",title:"Temporary Demo Title B"}]}]};
const input=document.getElementById("jsonInput"),out=document.getElementById("output"),view=document.getElementById("view");let last=null;input.value=JSON.stringify(ex,null,2);
function render(){if(!last){out.textContent="No ingest yet.";return}let v=view.value;if(v==="arc_core_jsonl")out.textContent=ARCSeedCatalog.arcCoreJSONL(last);else if(v==="proof_pack")out.textContent=JSON.stringify(ARCSeedCatalog.proofPack(last),null,2);else out.textContent=JSON.stringify(v==="all"?last:last[v],null,2)}
document.getElementById("file").onchange=async e=>{const f=e.target.files[0];if(f)input.value=await f.text()};
document.getElementById("ingest").onclick=async()=>{last=await ARCSeedCatalog.buildSplitBundles(JSON.parse(input.value),document.getElementById("seed").value,document.getElementById("epoch").value);render()};
document.getElementById("verify").onclick=async()=>{out.textContent=JSON.stringify(await ARCSeedCatalog.verifySplitBundle(last),null,2)};
view.onchange=render;function dl(name,body,type="application/json"){const blob=new Blob([body],{type});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click()}
document.getElementById("downloadAll").onclick=()=>{if(last)dl("arc-seedcatalog-v0.6.json",JSON.stringify(last,null,2))};
document.getElementById("downloadJSONL").onclick=()=>{if(last)dl("arc-core-records-v0.6.jsonl",ARCSeedCatalog.arcCoreJSONL(last),"application/x-ndjson")};
</script></body></html>
